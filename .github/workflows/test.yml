name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest lxml fastapi httpx python-multipart itsdangerous python-dotenv fastmcp mangum boto3

      - name: Run tests
        run: pytest tests/ -v --tb=short
