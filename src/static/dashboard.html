<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPEL2Orkes — Dashboard</title>
<style>
  :root {
    --bg:           #ffffff;
    --surface:      #f8fafc;
    --surface2:     #f1f5f9;
    --border:       #e2e8f0;
    --accent:       #6c63ff;
    --accent-hover: #5a52e8;
    --accent-light: #ede9ff;
    --success:      #16a34a;
    --warn:         #d97706;
    --error:        #dc2626;
    --text:         #1e293b;
    --muted:        #64748b;
    --code-bg:      #f1f5f9;
    --code-text:    #334155;
    --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    height: 60px;
    position: sticky; top: 0; z-index: 50;
  }
  .wordmark { display: flex; flex-direction: column; gap: 1px; text-decoration: none; }
  .wordmark-main { font-size: 17px; font-weight: 800; letter-spacing: -0.4px; color: var(--text); line-height: 1; }
  .wordmark-main span { color: var(--accent); }
  .wordmark-sub { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; }
  .ktools-badge { background: var(--accent-light); color: var(--accent); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; transition: color .15s, border-color .15s, background .15s; }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .header-links { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .header-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; padding: 4px 8px; border-radius: 6px; transition: color .15s; }
  .header-links a:hover { color: var(--error); }

  /* ── Main layout ── */
  .container { max-width: 700px; margin: 48px auto; padding: 0 24px 80px; }
  h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.3px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  /* ── Cards ── */
  .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .card h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--muted); margin-bottom: 14px; }
  .stat-row { display: flex; gap: 28px; }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat .num { font-size: 30px; font-weight: 800; line-height: 1; }
  .stat .lbl { font-size: 11px; color: var(--muted); }
  .num-green { color: var(--success); }
  .num-amber { color: var(--warn); }

  /* ── Tier badge ── */
  .tier-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .tier-free      { background: #dbeafe; color: #1e40af; }
  .tier-developer { background: var(--accent-light); color: var(--accent); }
  .tier-starter   { background: #dcfce7; color: #166534; }

  /* ── API key ── */
  .api-key-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  .api-key-display { font-family: var(--mono); font-size: 13px; background: var(--code-bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; flex: 1; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background .15s, border-color .15s; text-decoration: none; font-family: var(--font); }
  .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface); border-color: #c7d2fe; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: #fff; color: var(--error); border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fef2f2; border-color: #fca5a5; }
  .btn-upgrade { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
  .btn-upgrade:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Upgrade card ── */
  .upgrade-card { background: linear-gradient(135deg, #faf5ff, #ede9ff); border: 1px solid #c4b5fd; }
  .upgrade-card h3 { color: var(--accent); }

  /* ── Plan grid ── */
  .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .plan { border: 1px solid var(--border); border-radius: 8px; padding: 14px; background: #fff; }
  .plan.current { border-color: var(--accent); background: var(--accent-light); }
  .plan-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .plan-price { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .plan-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }

  /* ── Code snippets ── */
  code { font-family: var(--mono); font-size: 11px; background: var(--code-bg); color: var(--code-text); }
  code.block { display: block; padding: 8px 10px; border-radius: 6px; margin-top: 4px; overflow-x: auto; white-space: nowrap; }
  code.inline { padding: 1px 6px; border-radius: 3px; }

  /* ── Copy feedback ── */
  .copy-feedback { font-size: 11px; color: var(--success); margin-left: 4px; opacity: 0; transition: opacity .2s; }
  .copy-feedback.show { opacity: 1; }

  /* ── Success toast ── */
  .toast-success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #166534; }

  /* ── Loading ── */
  .loading { color: var(--muted); padding: 60px; text-align: center; font-size: 15px; }
</style>
</head>
<body>
<header>
  <a class="wordmark" href="/">
    <span class="wordmark-main">BPEL<span>2</span>Orkes</span>
    <span class="wordmark-sub">KTools · Kshetra Studio</span>
  </a>
  <span class="ktools-badge">KTools</span>
  <a href="/" class="back-btn">← Converter</a>
  <div class="header-links">
    <a href="/auth/logout">Sign out</a>
  </div>
</header>

<div class="container" id="app">
  <div class="loading">Loading your dashboard…</div>
</div>

<script>
(async () => {
  const app = document.getElementById('app');

  const fallback = setTimeout(() => {
    if (app.textContent.includes('Loading')) {
      app.innerHTML = '<div style="color:var(--warn);padding:20px;font-size:13px">Dashboard timed out. <a href="/auth/logout" style="color:var(--accent)">Sign out and try again</a></div>';
    }
  }, 6000);

  try {
    const ctrl = new AbortController();
    const fetchTimer = setTimeout(() => ctrl.abort(), 8000);
    const resp = await fetch('/api/v1/me', { signal: ctrl.signal });
    clearTimeout(fetchTimer);
    clearTimeout(fallback);
    if (!resp.ok) { window.location.href = '/'; return; }
    const user = await resp.json();

    const remaining = user.conversionsRemaining === 'unlimited' ? '∞' : user.conversionsRemaining;
    const balanceDollars = (user.creditBalanceCents / 100).toFixed(2);
    const centsPerConv = user.centsPerConversion || 10;
    const rateLabel = `$${(centsPerConv/100).toFixed(2)}/conversion · $1 = ${Math.floor(100/centsPerConv)} conversions`;
    const low = typeof user.conversionsRemaining === 'number' && user.conversionsRemaining <= 5;
    const tierLabel = {'free':'Free','paid':'Paid','starter':'Starter (Unlimited)'}[user.tier] || user.tier;
    const tierClass = user.tier === 'starter' ? 'tier-starter' : user.tier === 'paid' ? 'tier-developer' : 'tier-free';
    const topped = new URLSearchParams(location.search).get('topped_up');

    app.innerHTML = `
      ${topped ? '<div class="toast-success">✓ Credits added — ready to convert!</div>' : ''}

      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <h2>Welcome back, ${escHtml(user.name.split(' ')[0])}</h2>
        <a href="/#converter" class="btn btn-primary">Convert now →</a>
      </div>
      <div class="subtitle">${escHtml(user.email)}</div>

      <!-- Credits card -->
      <div class="card">
        <h3>Credits &amp; Usage</h3>
        <div class="stat-row" style="margin-bottom:16px">
          <div class="stat">
            <span class="num ${low ? 'num-amber' : 'num-green'}">${remaining}</span>
            <span class="lbl">Conversions left</span>
          </div>
          <div class="stat">
            <span class="num">$${balanceDollars}</span>
            <span class="lbl">Credit balance</span>
          </div>
          <div class="stat" style="margin-left:auto;align-items:flex-end">
            <span class="tier-badge ${tierClass}">${tierLabel}</span>
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted)">${user.tier === 'starter' ? '✓ Unlimited conversions included' : rateLabel}</div>
      </div>

      <!-- Top-up card -->
      ${user.tier !== 'starter' ? `
      <div class="card upgrade-card">
        <h3>Top up credits</h3>
        <p style="font-size:13px;color:var(--text);margin-bottom:16px">
          Add any amount — credits never expire. ${rateLabel}.
        </p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          <button class="btn btn-secondary" onclick="topup(500)">$5 <span style="font-size:11px;color:var(--muted)">50 conv</span></button>
          <button class="btn btn-secondary" onclick="topup(1000)">$10 <span style="font-size:11px;color:var(--muted)">100 conv</span></button>
          <button class="btn btn-secondary" onclick="topup(2500)">$25 <span style="font-size:11px;color:var(--muted)">250 conv</span></button>
          <button class="btn btn-upgrade" onclick="topup(10000)" id="topup-btn">$100 <span style="font-size:11px;opacity:0.85">1000 conv</span></button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="custom-amount" type="number" min="5" max="1000" placeholder="Custom $amount"
            style="width:150px;background:#fff;border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none">
          <button class="btn btn-secondary" onclick="topupCustom()">Add credits</button>
        </div>
        <div style="margin-top:14px">
          <a href="mailto:hello@kshetra.studio?subject=BPEL2Orkes Unlimited Plan" style="font-size:12px;color:var(--muted)">
            Need unlimited conversions? Ask about the Starter plan →
          </a>
        </div>
      </div>` : ''}

      <!-- API Key card -->
      <div class="card">
        <h3>Your API Key</h3>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
          Use this key to access the REST API and MCP server. Keep it secret.
        </div>
        <div class="api-key-row">
          <div class="api-key-display" id="key-display">${escHtml(user.apiKey)}</div>
          <button class="btn btn-secondary" onclick="revealKey()">Show</button>
          <button class="btn btn-secondary" onclick="copyKey()">Copy</button>
          <button class="btn btn-danger" id="rotate-btn" onclick="rotateKey()">Rotate</button>
          <span class="copy-feedback" id="copy-fb">Copied!</span>
        </div>

        <div style="margin-top:18px;display:flex;flex-direction:column;gap:12px;font-size:12px">
          <div>
            <div style="font-weight:600;color:var(--text);margin-bottom:4px">REST API header</div>
            <code class="block" id="snippet-rest">X-Api-Key: ${escHtml(user.apiKey)}</code>
          </div>
          <div>
            <div style="font-weight:600;color:var(--text);margin-bottom:4px">Claude Code MCP (HTTP)</div>
            <code class="block" id="snippet-mcp">claude mcp add --transport http bpel2orkes https://bpel2orkes.kshetra.studio/mcp/ --header "X-Api-Key: ${escHtml(user.apiKey)}"</code>
          </div>
          <div>
            <div style="font-weight:600;color:var(--text);margin-bottom:4px">Claude Desktop MCP (via mcp-remote)</div>
            <code class="block" id="snippet-desktop">{ "mcpServers": { "bpel2orkes": { "command": "npx", "args": ["mcp-remote", "https://bpel2orkes.kshetra.studio/mcp/", "--header", "X-Api-Key:${escHtml(user.apiKey)}"] } } }</code>
          </div>
        </div>
      </div>
    `;

    let _fullKey = null;

    function _updateKeyDisplay(key) {
      document.getElementById('key-display').textContent = key;
      document.getElementById('snippet-rest').textContent = `X-Api-Key: ${key}`;
      document.getElementById('snippet-mcp').textContent = `claude mcp add --transport http bpel2orkes https://bpel2orkes.kshetra.studio/mcp/ --header "X-Api-Key: ${key}"`;
      document.getElementById('snippet-desktop').textContent = `{ "mcpServers": { "bpel2orkes": { "command": "npx", "args": ["mcp-remote", "https://bpel2orkes.kshetra.studio/mcp/", "--header", "X-Api-Key:${key}"] } } }`;
    }

    window.revealKey = async () => {
      if (!_fullKey) {
        const r = await fetch('/api/v1/my-key', { credentials: 'include' });
        const d = await r.json();
        _fullKey = d.apiKey;
      }
      _updateKeyDisplay(_fullKey);
    };

    window.copyKey = async () => {
      if (!_fullKey) await window.revealKey();
      await navigator.clipboard.writeText(_fullKey);
      const fb = document.getElementById('copy-fb');
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 2000);
    };

    window.rotateKey = async () => {
      if (!confirm('Rotate your API key? Your current key will stop working immediately — update any MCP configs or scripts before confirming.')) return;
      const btn = document.getElementById('rotate-btn');
      btn.disabled = true; btn.textContent = 'Rotating…';
      try {
        const r = await fetch('/api/v1/rotate-key', { method: 'POST', credentials: 'include' });
        if (!r.ok) { alert('Rotation failed. Please try again.'); return; }
        const d = await r.json();
        _fullKey = d.apiKey;
        _updateKeyDisplay(_fullKey);
        btn.textContent = 'Rotated!';
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Rotate'; }, 3000);
      } catch (e) {
        alert('Rotation failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Rotate';
      }
    };

    window.topup = async (amount_cents) => {
      const btn = document.getElementById('topup-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
      const r = await fetch('/api/v1/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount_cents }),
        credentials: 'include',
      });
      const d = await r.json();
      if (d.url) { window.location.href = d.url; return; }
      if (btn) { btn.disabled = false; btn.textContent = `$${(amount_cents/100).toFixed(0)} — ${Math.floor(amount_cents/centsPerConv)} conv`; }
      if (r.status === 503) {
        alert("Payments aren't enabled yet — contact support to add credits manually.");
      } else {
        alert('Checkout error: ' + (typeof d.detail === 'string' ? d.detail : 'Something went wrong — please try again.'));
      }
    };

    window.topupCustom = () => {
      const input = document.getElementById('custom-amount');
      const dollars = parseFloat(input.value);
      if (!dollars || dollars < 5 || dollars > 1000) {
        alert('Enter an amount between $5 and $1,000.');
        return;
      }
      window.topup(Math.round(dollars * 100));
    };

  } catch(e) {
    app.innerHTML = `<div style="color:var(--error);padding:20px;font-family:monospace;font-size:13px">
      <strong>Dashboard error:</strong><br>${e}</div>`;
  }
})();

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
